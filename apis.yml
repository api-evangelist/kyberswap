name: KyberSwap
description: KyberSwap is a multi-chain DEX aggregator and liquidity protocol offering
  REST APIs for swap routing, limit orders, liquidity provision via Zap-as-a-Service,
  and on-chain token pricing. It aggregates liquidity across 420+ sources on 17+ EVM
  chains, enabling developers to access best-rate swaps, manage limit orders gaslessly,
  and enter or exit concentrated liquidity positions with any single token.
