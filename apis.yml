    email: bd@kyber.network
  x-api-type: REST
  x-authentication: none
  x-rate-limit-header: X-Client-Id
- name: KyberSwap Limit Order API
  description: Enables creation, management, and fulfillment of gasless limit orders.
    Exposes General, Maker, and Taker endpoint sets for reading order pairs, signing
    and submitting orders, and encoding fill calldata for on-chain settlement.
  humanURL: https://docs.kyberswap.com/kyberswap-solutions/limit-order
  baseURL: https://limit-order.kyberswap.com
  tags:
  - Limit Orders
