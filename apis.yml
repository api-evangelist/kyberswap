  x-authentication: none
- name: KyberSwap Zap as a Service (ZaaS) API
  description: Streamlines adding and removing concentrated liquidity positions using
    any single token. Provides Zap-In, Zap-Out, and Zap-Migrate endpoints via HTTP
    REST and gRPC. Powers KyberSwap Earn and the Liquidity Widget.
  humanURL: https://docs.kyberswap.com/kyberswap-solutions/kyberswap-zap-as-a-service
  baseURL: https://zap-api.kyberswap.com
